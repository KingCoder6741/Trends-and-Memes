<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPulse // Brazilian Phonk Edit Deck</title>
    <!-- Font Awesome for sharp icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-purple: #9d4edd;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --bg-darker: #050508;
            --bg-card: #0d0e15;
            --border-glow: #1a1c29;
            --text-main: #ffffff;
            --text-muted: #8b8fba;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-darker);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-darker); }
        ::-webkit-scrollbar-thumb { background: #222538; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-pink); }

        /* Navbar Layout */
        .navbar {
            position: fixed; top: 0; width: 100%;
            padding: 15px 40px;
            background: rgba(5, 5, 8, 0.8);
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-between;
            align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--border-glow);
            box-sizing: border-box;
        }
        .logo {
            font-weight: 900; font-size: 1.4rem; letter-spacing: -1px;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Hero Wrapper */
        .hero {
            padding: 140px 20px 40px;
            text-align: center;
            max-width: 800px; margin: 0 auto;
        }
        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4rem); margin: 0 0 15px 0;
            letter-spacing: -2px; line-height: 1.1; font-weight: 800;
        }
        .hero p { color: var(--text-muted); font-size: 1.1rem; margin: 0; }

        /* Main Grid Layout */
        .feed-container { max-width: 1100px; margin: 0 auto; padding: 0 20px 100px; }
        .trend-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Card Elements */
        .trend-card {
            background: var(--bg-card); border: 1px solid var(--border-glow);
            border-radius: 16px; overflow: hidden; display: flex;
            flex-direction: column; transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }
        .trend-card:hover {
            transform: translateY(-4px); border-color: #2b2e47;
        }
        .card-header {
            padding: 20px 20px 10px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .category-badge {
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; padding: 4px 10px; border-radius: 20px;
            background: rgba(255, 0, 127, 0.15); color: var(--neon-pink);
        }
        .velocity { font-size: 0.85rem; font-weight: 600; color: var(--neon-green); }

        .card-body { padding: 0 20px 15px; flex-grow: 1; }
        .card-title { font-size: 1.25rem; font-weight: 700; margin: 0 0 10px 0; line-height: 1.3; color: #fff;}
        .card-desc { color: var(--text-muted); font-size: 0.95rem; margin: 0 0 15px 0; line-height: 1.5; }

        /* Audio Controls Box */
        .audio-preview-box {
            background: #11131f; margin: 0 20px 15px; padding: 12px 15px;
            border-radius: 10px; border: 1px solid #1f2238;
            display: flex; align-items: center; gap: 15px;
        }
        .play-btn {
            background: var(--neon-pink); color: #000; border: none;
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 0.95rem; transition: transform 0.2s;
        }
        .play-btn:hover { transform: scale(1.08); }
        .audio-wave {
            display: flex; gap: 3px; align-items: flex-end; height: 22px; flex-grow: 1;
        }
        .wave-bar {
            width: 3px; background: #2b2e47; height: 30%; border-radius: 3px;
        }
        .playing .wave-bar {
            animation: bounce 0.8s ease infinite alternate;
            background: var(--neon-pink);
        }
        .playing .wave-bar:nth-child(2) { animation-delay: 0.15s; }
        .playing .wave-bar:nth-child(3) { animation-delay: 0.3s; }
        .playing .wave-bar:nth-child(4) { animation-delay: 0.05s; }
        .playing .wave-bar:nth-child(5) { animation-delay: 0.2s; }

        /* Visual Timeline Data Block */
        .timeline-box {
            background: #090a0f; border-radius: 8px; padding: 12px;
            border: 1px solid #161826; font-size: 0.8rem; margin-bottom: 15px;
        }
        .timeline-title { font-weight: 700; color: var(--neon-blue); text-transform: uppercase; margin-bottom: 6px; display: block;}
        .timeline-list { margin: 0; padding: 0; list-style: none; color: var(--text-muted); }
        .timeline-list li { margin-bottom: 4px; display: flex; gap: 8px;}
        .timeline-list strong { color: var(--neon-purple); min-width: 40px;}

        /* Hype Bar Component */
        .hype-container { padding: 0 20px 20px; }
        .hype-label-row {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
            margin-bottom: 6px; text-transform: uppercase;
        }
        .hype-bar-bg {
            background: #161825; height: 6px; border-radius: 10px; overflow: hidden;
        }
        .hype-bar-fill {
            height: 100%; width: 0%; border-radius: 10px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
            transition: width 1s ease-out;
        }

        .card-footer {
            padding: 15px 20px; background: #0a0b10;
            border-top: 1px solid var(--border-glow);
            display: flex; justify-content: space-between; align-items: center;
        }
        .action-btn {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: 0.9rem; font-weight: 600; transition: color 0.2s;
        }
        .action-btn:hover { color: var(--text-main); }
        .action-btn.upvoted { color: var(--neon-pink); }
        .action-btn.copied { color: var(--neon-green); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-bolt-lightning"></i> PHONKSTATION</div>
        <div style="font-size: 0.8rem; font-weight: 700; color: var(--neon-green); letter-spacing: 1px;">
            <i class="fa-solid fa-circle" style="font-size: 0.6rem; margin-right: 5px;"></i> EDIT ENGINE ACTIVE
        </div>
    </nav>

    <div class="hero">
        <h1>Brazilian Funk Edit Deck</h1>
        <p>Real-time trending short-form soundscapes, timeline configurations, and audio macro loops.</p>
    </div>

    <div class="feed-container">
        <div class="trend-grid" id="feedGrid">
            <!-- Cards loop injected via script -->
        </div>
    </div>

    <script>
        let currentAudio = null;
        let currentPlayButton = null;

        const trendData = [
            {
                id: 1, category: "Trending Brazilian Phonk",
                title: "MONTAGEM PEGADORA — Rubikdice, Chilx, WAA", 
                desc: "The absolute dominant high-velocity mandelão track powering drift compilations and sudden glitch flash transitions.",
                velocity: "+680% breakout", hype: 99, shares: "3.1M",
                audioUrl: "https://publicaudio.org",
                t1: "0.0s", d1: "Distorted 808 sub-bass build-up intro",
                t2: "1.2s", d2: "Vocal sample chop repetition drop loop",
                t3: "2.4s", d3: "Hard flash frame transition sequence cut"
            },
            {
                id: 2, category: "Trending Brazilian Phonk",
                title: "MONTAGEM PEGADORA (Slowed Reverb)", 
                desc: "The heavy, down-tempo adaptation designed for deep atmospheric background overlays and slow-motion loops.",
                velocity: "+490% viral", hype: 95, shares: "1.9M",
                audioUrl: "https://publicaudio.org",
                t1: "0.0s", d1: "Pitch-shifted sub frequencies baseline rumble",
                t2: "1.5s", d2: "Delayed echo voice chop pacing block",
                t3: "3.0s", d3: "High-saturation screen glow color grading flash"
            }
        ];

        function buildGrid(data) {
            const grid = document.getElementById('feedGrid');
            grid.innerHTML = '';

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'trend-card';

                card.innerHTML = `
                    <div class="card-header">
                        <span class="category-badge">${item.category}</span>
                        <span class="velocity"><i class="fa-solid fa-arrow-trend-up"></i> ${item.velocity}</span>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${item.title}</h3>
                        <p class="card-desc">${item.desc}</p>
                        
                        <div class="timeline-box">
                            <span class="timeline-title"><i class="fa-regular fa-clock"></i> Edit Cut Marks</span>
                            <ul class="timeline-list">
                                <li><strong>${item.t1}</strong> <span>${item.d1}</span></li>
                                <li><strong>${item.t2}</strong> <span>${item.d2}</span></li>
                                <li><strong>${item.t3}</strong> <span>${item.d3}</span></li>
                            </ul>
                        </div>
                    </div>

                    <div class="audio-preview-box" id="audiobox-${item.id}">
                        <button class="play-btn" onclick="toggleAudio(this, '${item.audioUrl}', ${item.id})">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <div class="audio-wave">
                            <div class="wave-bar"></div>
                            <div class="wave-bar"></div>
                            <div class="wave-bar"></div>
                            <div class="wave-bar"></div>
                            <div class="wave-bar"></div>
                        </div>
                    </div>

                    <div class="hype-container">
                        <div class="hype-label-row">
                            <span>Trend Density</span>
                            <span>${item.hype}%</span>
                        </div>
                        <div class="hype-bar-bg">
                            <div class="hype-bar-fill" id="bar-${item.id}"></div>
                        </div>
                    </div>

                    <div class="card-footer">
                        <button class="action-btn" onclick="handleUpvote(this)">
                            <i class="fa-regular fa-heart"></i> <span>${item.shares}</span>
                        </button>
                        <button class="action-btn" onclick="copyLink(this, ${item.id})">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);

                setTimeout(() => {
                    const fillBar = document.getElementById(`bar-${item.id}`);
                    if(fillBar) fillBar.style.width = `${item.hype}%`;
                }, 50);
            });
        }

        function toggleAudio(btn, url, id) {
            const container = document.getElementById(`audiobox-${id}`);
            const icon = btn.querySelector('i');

            if (currentAudio && currentPlayButton === btn) {
                if (!currentAudio.paused) {
                    currentAudio.pause();
                    container.classList.remove('playing');
                    icon.className = "fa-solid fa-play";
                } else {
                    currentAudio.play();
                    container.classList.add('playing');
                    icon.className = "fa-solid fa-pause";
                }
                return;
            }

            if (currentAudio) {
                currentAudio.pause();
                document.querySelectorAll('.audio-preview-box').forEach(box => box.classList.remove('playing'));
                document.querySelectorAll('.play-btn i').forEach(i => i.className = "fa-solid fa-play");
            }

            currentAudio = new Audio(url);
            currentPlayButton = btn;

            currentAudio.play().then(() => {
                container.classList.add('playing');
                icon.className = "fa-solid fa-pause";
            }).catch(e => alert("Click page backdrop first to authorize browser media permissions!"));

            currentAudio.onended = function() {
                container.classList.remove('playing');
                icon.className = "fa-solid fa-play";
                currentAudio = null;
                currentPlayButton = null;
            };
        }

        function handleUpvote(btn) {
            const icon = btn.querySelector('i');
            btn.classList.toggle('upvoted');
            icon.className = btn.classList.contains('upvoted') ? "fa-solid fa-heart" : "fa-regular fa-heart";
        }

        function copyLink(btn, id) {
            navigator.clipboard.writeText(`${window.location.origin}/edit?id=${id}`).then(() => {
                const icon = btn.querySelector('i');
                btn.classList.add('copied');
                icon.className = "fa-solid fa-check";
                setTimeout(() => {
                    btn.classList.remove('copied');
                    icon.className = "fa-regular fa-copy";
                }, 2000);
            });
        }

        buildGrid(trendData);
    </script>

    <style>
        @keyframes bounce {
            0% { height: 20%; }
            100% { height: 100%; }
        }
    </style>
</body>
</html>
