\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPulse // Culture & Meme Index</title>
    <!-- Font Awesome for sharp icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-purple: #9d4edd;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --bg-darker: #050508;
            --bg-card: #0d0e15;
            --border-glow: #1a1c29;
            --text-main: #ffffff;
            --text-muted: #8b8fba;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-darker);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-darker); }
        ::-webkit-scrollbar-thumb { background: #222538; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

        /* Navbar Layout */
        .navbar {
            position: fixed; top: 0; width: 100%;
            padding: 15px 40px;
            background: rgba(5, 5, 8, 0.8);
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-between;
            align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--border-glow);
            box-sizing: border-box;
        }
        .logo {
            font-weight: 900; font-size: 1.4rem; letter-spacing: -1px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Hero Wrapper */
        .hero {
            padding: 140px 20px 60px;
            text-align: center;
            max-width: 800px; margin: 0 auto;
        }
        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4rem); margin: 0 0 15px 0;
            letter-spacing: -2px; line-height: 1.1; font-weight: 800;
        }
        .hero p { color: var(--text-muted); font-size: 1.1rem; margin: 0; }

        /* Filter Controls */
        .filters {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #121420; border: 1px solid var(--border-glow);
            color: var(--text-muted); padding: 10px 20px; border-radius: 30px;
            cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--text-main); color: var(--bg-darker);
            border-color: var(--text-main);
        }

        /* Main Grid */
        .feed-container { max-width: 1100px; margin: 0 auto; padding: 0 20px 100px; }
        .trend-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Card Elements */
        .trend-card {
            background: var(--bg-card); border: 1px solid var(--border-glow);
            border-radius: 16px; overflow: hidden; display: flex;
            flex-direction: column; transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }
        .trend-card:hover {
            transform: translateY(-4px); border-color: #2b2e47;
        }
        .card-header {
            padding: 20px 20px 10px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .category-badge {
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; padding: 4px 10px; border-radius: 20px;
        }
        .badge-meme { background: rgba(157, 78, 221, 0.15); color: var(--neon-purple); }
        .badge-tech { background: rgba(0, 240, 255, 0.15); color: var(--neon-blue); }
        .badge-audio { background: rgba(255, 0, 127, 0.15); color: var(--neon-pink); }
        
        .velocity { font-size: 0.85rem; font-weight: 600; color: var(--neon-green); }

        .card-body { padding: 0 20px 20px; flex-grow: 1; }
        .card-title { font-size: 1.3rem; font-weight: 700; margin: 0 0 10px 0; line-height: 1.3; }
        .card-desc { color: var(--text-muted); font-size: 0.95rem; margin: 0; line-height: 1.5; }

        /* Custom Audio Component Element */
        .audio-preview-box {
            background: #11131f; margin: 0 20px 15px; padding: 12px 15px;
            border-radius: 10px; border: 1px solid #1f2238;
            display: flex; align-items: center; gap: 15px;
        }
        .play-btn {
            background: var(--neon-pink); color: #000; border: none;
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 0.9rem; transition: transform 0.2s;
        }
        .play-btn:hover { transform: scale(1.08); }
        .audio-wave {
            display: flex; gap: 3px; align-items: flex-end; height: 20px; flex-grow: 1;
        }
        .wave-bar {
            width: 3px; background: #2b2e47; height: 30%; border-radius: 3px;
        }
        .playing .wave-bar {
            animation: bounce 0.8s ease infinite alternate;
            background: var(--neon-pink);
        }
        .playing .wave-bar:nth-child(2) { animation-delay: 0.15s; }
        .playing .wave-bar:nth-child(3) { animation-delay: 0.3s; }
        .playing .wave-bar:nth-child(4) { animation-delay: 0.05s; }
        .playing .wave-bar:nth-child(5) { animation-delay: 0.2s; }

        /* Custom Interactive Hype Bar Component */
        .hype-container { padding: 0 20px 20px; }
        .hype-label-row {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
            margin-bottom: 6px; text-transform: uppercase;
        }
        .hype-bar-bg {
            background: #161825; height: 6px; border-radius: 10px; overflow: hidden;
        }
        .hype-bar-fill {
            height: 100%; width: 0%; border-radius: 10px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            transition: width 1s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        .trend-card[data-type="audio"] .hype-bar-fill {
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
        }

        .card-footer {
            padding: 15px 20px; background: #0a0b10;
            border-top: 1px solid var(--border-glow);
            display: flex; justify-content: space-between; align-items: center;
        }
        .footer-left { display: flex; align-items: center; }
        .footer-right { display: flex; align-items: center; gap: 15px; }
        
        .action-btn {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: 0.9rem; font-weight: 600; transition: color 0.2s;
            padding: 5px;
        }
        .action-btn:hover { color: var(--text-main); }
        .action-btn.upvoted { color: var(--neon-blue); }
        .action-btn.hearted { color: var(--neon-pink); }
        .action-btn.copied { color: var(--neon-green); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-bolt-lightning"></i> TRENDPULSE</div>
        <div id="live-indicator" style="font-size: 0.8rem; font-weight: 700; color: var(--neon-green); letter-spacing: 1px;">
            <i class="fa-solid fa-circle" style="font-size: 0.6rem; margin-right: 5px; animation: blink 1.5s infinite;"></i> STABLE STREAM LIVE
        </div>
    </nav>

    <div class="hero">
        <h1>What the internet is obsessed with right now.</h1>
        <p>Real-time algorithmic cultural indexing tracking viral formats, edit audio, and high-octane gaming trends.</p>
    </div>

    <div class="feed-container">
        <div class="filters">
            <button class="filter-btn active" onclick="filterCategory('all', this)">All Feeds</button>
            <button class="filter-btn" onclick="filterCategory('audio', this)">Hype Edit Audio</button>
            <button class="filter-btn" onclick="filterCategory('meme', this)">Meme Formats</button>
            <button class="filter-btn" onclick="filterCategory('tech', this)">Tech & AI</button>
        </div>

        <div class="trend-grid" id="feedGrid">
            <!-- Cards injection dynamic data -->
        </div>
    </div>

    <script>
        let currentAudio = null;
        let currentPlayButton = null;

        // Fully operational sound stream configurations
        const trendData = [
            {
                id: 1, type: "audio", category: "Trending Audio", 
                title: "Head Shot / Gas In The Truck — Cyber Phonk Mix", desc: "The mega-viral Phonk-Trap crossover dominating anime edits, gaming highlight clips, and sport reels globally.",
                velocity: "+520% explosive", hype: 99, shares: "2.4M", holdsAudio: true,
                audioUrl: "https://publicaudio.org"
            },
            {
                id: 2, type: "audio", category: "Trending Audio", 
                title: "headshot / Heavy Metal Synth Loop — RJ Style", desc: "The heavy trap-metal instrumental loop backing clean stop-motion changes and high-speed gameplay montages.",
                velocity: "+410% breakout", hype: 96, shares: "1.8M", holdsAudio: true,
                audioUrl: "https://publicaudio.org"
            },
            {
                id: 3, type: "meme", category: "Meme Format", 
                title: "Philosophical Sloth Debates", desc: "Absurdist multi-panel templates showcasing hyper-intellectual theories juxtaposed with basic daily chores.",
                velocity: "+240% this week", hype: 88, shares: "42K", holdsAudio: false
            },
            {
                id: 4, type: "audio", category: "Trending Audio", 
                title: "PRESSURE! — Cinematic Bass Drop", desc: "High-octane, booming percussion backdrop used for sudden cinematic cuts and fast-paced athletic transitions.",
                velocity: "+310% viral", hype: 91, shares: "740K", holdsAudio: true,
                audioUrl: "https://publicaudio.org"
            },
            {
                id: 5, type: "tech", category: "Tech & AI", 
                title: "Holistic Wearable Ecosystems", desc: "Biometric rings and smart clothing patterns are moving entirely away from screens toward tactile ambient notifications.",
                velocity: "+185% velocity", hype: 74, shares: "19K", holdsAudio: false
            }
        ];

        function buildGrid(data) {
            stopAllAudio();
            const grid = document.getElementById('feedGrid');
            grid.innerHTML = '';
            
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `trend-card`;
                card.setAttribute('data-type', item.type);
                
                let audioBoxMarkup = '';
                if(item.holdsAudio) {
                    audioBoxMarkup = `
                        <div class="audio-preview-box" id="audiobox-${item.id}">
                            <button class="play-btn" onclick="toggleAudio(this, '${item.audioUrl}', ${item.id})">
                                <i class="fa-solid fa-play"></i>
                            </button>
                            <div class="audio-wave">
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <span class="category-badge badge-${item.type}">${item.category}</span>
                        <span class="velocity"><i class="fa-solid fa-arrow-trend-up"></i> ${item.velocity}</span>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${item.title}</h3>
                        <p class="card-desc">${item.desc}</p>
                    </div>
                    ${audioBoxMarkup}
                    <div class="hype-container">
                        <div class="hype-label-row">
                            <span>Viral Density</span>
                            <span>${item.hype}%</span>
                        </div>
                        <div class="hype-bar-bg">
                            <div class="hype-bar-fill" id="bar-${item.id}"></div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="footer-left">
                            <button class="action-btn" onclick="handleUpvote(this, '${item.type}')">
                                <i class="fa-regular fa-heart"></i> <span>${item.shares}</span>
                            </button>
                        </div>
                        <div class="footer-right">
                            <button class="action-btn" title="Copy Trend Link" onclick="copyTrendLink(this, ${item.id})">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                            <button class="action-btn" title="Share Options">
                                <i class="fa-solid fa-share-nodes"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                
                setTimeout(() => {
                    const fillBar = document.getElementById(`bar-${item.id}`);
                    if(fillBar) fillBar.style.width = `${item.hype}%`;
                }, 50);
            });
        }

        function filterCategory(type, button) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            if (type === 'all') {
                buildGrid(trendData);
            } else {
                const filtered = trendData.filter(item => item.type === type);
                buildGrid(filtered);
            }
        }

        function toggleAudio(btn, url, id) {
            const container = document.getElementById(`audiobox-${id}`);
            const icon = btn.querySelector('i');
            
            if (currentAudio && currentPlayButton === btn) {
                if (!currentAudio.paused) {
                    currentAudio.pause();
                    container.classList.remove('playing');
                    icon.className = "fa-solid fa-play";
                } else {
                    currentAudio.play();
                    container.classList.add('playing');
                    icon.className = "fa-solid fa-pause";
                }
                return;
            }

            stopAllAudio();

            currentAudio = new Audio(url);
            currentPlayButton = btn;
            
            currentAudio.play().then(() => {
                container.classList.add('playing');
                icon.className = "fa-solid fa-pause";
            }).catch(error => {
                console.log("Audio stream configuration conflict detected", error);
            });

            currentAudio.onended = function() {
                container.classList.remove('playing');
                icon.className = "fa-solid fa-play";
                currentAudio = null;
                currentPlayButton = null;
            };
        }

        function stopAllAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            document.querySelectorAll('.audio-preview-box').forEach(box => {
                box.classList.remove('playing');
                const playBtnIcon = box.querySelector('.play-btn i');
                if (playBtnIcon) playBtnIcon.className = "fa-solid fa-play";
            });
            currentPlayButton = null;
        }

        function handleUpvote(btn, type) {
            const icon = btn.querySelector('i');
            const toggleClass = type === 'audio' ? 'hearted' : 'upvoted';
            
            btn.classList.toggle(toggleClass);
            if(btn.classList.contains(toggleClass)) {
                icon.className = "fa-solid fa-heart";
            } else {
                icon.className = "fa-regular fa-heart";
            }
        }

        function copyTrendLink(btn, id) {
            const shareUrl = `${window.location.origin}/trends?id=${id}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                const icon = btn.querySelector('i');
                btn.classList.add('copied');
                icon.className = "fa-solid fa-check";
                
                setTimeout(() => {
                    btn.classList.remove('copied');
                    icon.className = "fa-regular fa-copy";
                }, 2000);
            });
        }

        buildGrid(trendData);
    </script>

    <style>
        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @keyframes bounce {
            0% { height: 20%; }
            100% { height: 100%; }
        }
    </style>
</body>
</html>
